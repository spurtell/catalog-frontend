<style>
@import url('https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;600;700&family=Red+Hat+Text:wght@400;500;600&display=swap');

/* ===== CSS Variables — Red Hat Brand Colors ===== */
:root {
  /* Red Hat core */
  --rh-red: #EE0000;
  --rh-red-dark: #A60000;
  --rh-red-light: #FEF0F0;
  --rh-red-10: #FCE3E3;
  --rh-red-20: #FBC5C5;

  /* Interaction blue (primary actions) */
  --primary: #0066CC;
  --primary-dark: #004D99;
  --primary-light: #E0F0FF;

  /* Status colors */
  --danger: #F0561D;
  --danger-light: #FFE3D9;
  --success: #63993D;
  --success-light: #E9F7DF;
  --warning: #F5921B;
  --warning-light: #FFE8CC;

  /* Teal accent */
  --teal: #37A3A3;
  --teal-light: #DAF2F2;

  /* Purple accent */
  --purple: #5E40BE;
  --purple-light: #ECE6FF;

  /* Gray scale (Red Hat official) */
  --gray-10: #F2F2F2;
  --gray-20: #E0E0E0;
  --gray-30: #C7C7C7;
  --gray-40: #A3A3A3;
  --gray-50: #707070;
  --gray-60: #4D4D4D;
  --gray-70: #383838;
  --gray-80: #292929;
  --gray-90: #1F1F1F;
  --gray-95: #151515;

  --radius: 8px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.08);
  --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 8px rgba(0,0,0,0.2), 0 2px 4px rgba(0,0,0,0.12);
  --shadow-lg: 0 10px 20px rgba(0,0,0,0.2), 0 4px 8px rgba(0,0,0,0.1);
}

/* ===== Reset & Base ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Red Hat Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  color: var(--gray-90);
  background: var(--gray-20);
  line-height: 1.5;
}

/* ===== Header ===== */
.app-header {
  background: var(--gray-95);
  border-bottom: 2px solid var(--rh-red);
  padding: 0 1.5rem;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-content {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
}

.header-content h1 {
  font-size: 1.125rem;
  font-weight: 600;
  color: white;
}

.header-buttons {
  display: flex;
  gap: 0.5rem;
  align-items: center;
}

/* ===== Navigation Tabs ===== */
.nav-tabs {
  display: flex;
  gap: 0;
  background: var(--gray-90);
  border-bottom: 1px solid var(--gray-70);
  padding: 0 1.5rem;
}

.nav-tab {
  padding: 0.75rem 1.25rem;
  border: none;
  background: none;
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--gray-40);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}

.nav-tab:hover { color: white; }

.nav-tab.active {
  color: white;
  border-bottom-color: var(--rh-red);
}

/* ===== Main Container ===== */
.main-container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 1.5rem;
}

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.375rem;
  padding: 0.5rem 1rem;
  border-radius: 6px;
  font-size: 0.875rem;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
}

.btn-primary {
  background: var(--rh-red);
  color: white;
  border-color: var(--rh-red);
}
.btn-primary:hover { background: var(--rh-red-dark); }

.btn-secondary {
  background: white;
  color: var(--gray-70);
  border-color: var(--gray-30);
}
.btn-secondary:hover { background: var(--gray-10); border-color: var(--gray-40); }

.btn-danger {
  background: white;
  color: var(--rh-red);
  border-color: var(--rh-red);
}
.btn-danger:hover { background: var(--rh-red-light); }

.btn-small { padding: 0.25rem 0.625rem; font-size: 0.8125rem; }

.btn-clear {
  background: var(--rh-red);
  color: white;
  border-color: var(--rh-red);
}
.btn-clear:hover { background: var(--rh-red-dark); }

.btn-icon {
  padding: 0.375rem;
  border-radius: 6px;
  background: none;
  border: 1px solid transparent;
  cursor: pointer;
  color: var(--gray-40);
  display: inline-flex;
  align-items: center;
}
.btn-icon:hover { background: var(--gray-10); color: var(--gray-60); }

/* ===== Filter Bar ===== */
.filter-bar {
  background: white;
  border: 1px solid var(--gray-20);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 1.25rem;
  box-shadow: var(--shadow-sm);
}

.filter-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  align-items: flex-end;
}

.filter-group {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
  min-width: 0;
}

.filter-group label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--gray-50);
  text-transform: uppercase;
  letter-spacing: 0.025em;
}

.filter-group select,
.filter-group input[type="text"] {
  padding: 0.375rem 0.625rem;
  border: 1px solid var(--gray-30);
  border-radius: 6px;
  font-size: 0.875rem;
  color: var(--gray-90);
  background: white;
  min-width: 140px;
}

.filter-group input[type="text"] { min-width: 200px; }

.filter-group select:focus,
.filter-group input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.15);
}

.filter-actions {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-left: auto;
}

.item-count {
  font-size: 0.8125rem;
  color: var(--gray-50);
  white-space: nowrap;
}

/* ===== Card Grid ===== */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1rem;
}

.card {
  background: white;
  border: 1px solid var(--gray-20);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.card:hover {
  border-color: var(--rh-red);
  box-shadow: 0 4px 12px rgba(238, 0, 0, 0.12), var(--shadow-md);
  transform: translateY(-1px);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 0.5rem;
}

.card-title {
  font-size: 0.9375rem;
  font-weight: 600;
  color: var(--gray-95);
  line-height: 1.3;
}

.card-summary {
  font-size: 0.8125rem;
  color: var(--gray-60);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-meta {
  display: flex;
  gap: 0.375rem;
  margin-top: auto;
  padding-top: 0.5rem;
  border-top: 1px solid var(--gray-10);
  align-items: center;
  min-width: 0;
}

.card-meta-item {
  font-size: 0.75rem;
  color: var(--gray-50);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  min-width: 0;
}

.card-link-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  padding: 0.25rem 0.625rem;
  font-size: 0.75rem;
  font-weight: 600;
  color: white;
  background: var(--primary);
  border: none;
  border-radius: 4px;
  cursor: pointer;
  text-decoration: none;
  margin-left: auto;
  flex-shrink: 0;
}
.card-link-btn:hover { background: var(--primary-dark); }

/* ===== Badges ===== */
.badge {
  display: inline-block;
  padding: 0.125rem 0.5rem;
  border-radius: 10px;
  font-size: 0.6875rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  white-space: nowrap;
}

.badge-status-current { background: var(--success-light); color: #3D7317; }
.badge-status-needs-review { background: var(--warning-light); color: #9E4A06; }
.badge-status-gap { background: #FEF0F0; color: var(--rh-red-dark); }

.badge-type {
  background: var(--teal-light);
  color: #147878;
}

/* ===== Modal ===== */
.modal {
  position: fixed;
  inset: 0;
  z-index: 200;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 2rem 1rem;
  overflow-y: auto;
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
}

.modal-content {
  position: relative;
  background: white;
  border: 1px solid var(--gray-20);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 640px;
  margin-top: 2rem;
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--gray-20);
}

.modal-header h2 {
  font-size: 1.125rem;
  font-weight: 600;
  color: var(--gray-95);
}

.modal-close {
  background: none;
  border: none;
  font-size: 1.5rem;
  color: var(--gray-40);
  cursor: pointer;
  padding: 0.25rem;
  line-height: 1;
}
.modal-close:hover { color: var(--gray-70); }

.modal-body { padding: 1.5rem; }

.modal-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 1.5rem;
  border-top: 1px solid var(--gray-20);
  gap: 0.5rem;
}

.modal-footer-right {
  display: flex;
  gap: 0.5rem;
  margin-left: auto;
}

/* ===== Form ===== */
.form-group {
  margin-bottom: 1rem;
}

.form-group label {
  display: block;
  font-size: 0.8125rem;
  font-weight: 600;
  color: var(--gray-70);
  margin-bottom: 0.25rem;
}

.form-group .required { color: var(--rh-red); }

.form-group input[type="text"],
.form-group input[type="url"],
.form-group input[type="date"],
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 0.5rem 0.75rem;
  border: 1px solid var(--gray-30);
  border-radius: 6px;
  font-size: 0.875rem;
  color: var(--gray-90);
  background: white;
  font-family: inherit;
}

.form-group textarea { resize: vertical; min-height: 80px; }

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.15);
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}

/* ===== Multi-select Dropdown ===== */
.multiselect {
  position: relative;
}

.multiselect-toggle {
  width: 100%;
  padding: 0.5rem 0.75rem;
  border: 1px solid var(--gray-30);
  border-radius: 6px;
  font-size: 0.875rem;
  color: var(--gray-90);
  background: white;
  cursor: pointer;
  text-align: left;
  min-height: 2.25rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
}

.multiselect-toggle:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.15);
}

.multiselect-toggle .placeholder { color: var(--gray-40); }
.multiselect-toggle .arrow { font-size: 0.625rem; color: var(--gray-40); flex-shrink: 0; }

.multiselect-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  z-index: 10;
  background: white;
  border: 1px solid var(--gray-30);
  border-radius: 6px;
  box-shadow: var(--shadow-md);
  max-height: 200px;
  overflow-y: auto;
  margin-top: 2px;
}

.multiselect-dropdown label {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.375rem 0.75rem;
  font-size: 0.8125rem;
  font-weight: 400;
  color: var(--gray-70);
  cursor: pointer;
  margin-bottom: 0;
}

.multiselect-dropdown label:hover { background: var(--gray-10); }

.multiselect-dropdown input[type="checkbox"] {
  width: auto;
  margin: 0;
}

/* ===== Component Warning Badge ===== */
.badge-component-warning {
  background: var(--warning-light);
  color: #9E4A06;
  font-size: 0.625rem;
  padding: 0.0625rem 0.375rem;
  border-radius: 8px;
  font-weight: 600;
  white-space: nowrap;
}

/* ===== Team Directory Tables ===== */
.td-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 0;
  border-bottom: 1px solid var(--gray-20);
  margin-bottom: 1rem;
}

.td-tab {
  padding: 0.5rem 1rem;
  border: none;
  background: none;
  font-size: 0.8125rem;
  font-weight: 500;
  color: var(--gray-50);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}

.td-tab:hover { color: var(--gray-90); }
.td-tab.active { color: var(--gray-95); border-bottom-color: var(--rh-red); }

.td-filter-bar {
  background: white;
  border: 1px solid var(--gray-20);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 1rem;
  box-shadow: var(--shadow-sm);
}

.td-toolbar {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 0.75rem;
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border: 1px solid var(--gray-20);
  border-radius: var(--radius);
  overflow: hidden;
  font-size: 0.875rem;
}

.data-table th {
  background: var(--gray-10);
  padding: 0.625rem 0.75rem;
  text-align: left;
  font-weight: 600;
  font-size: 0.75rem;
  color: var(--gray-60);
  text-transform: uppercase;
  letter-spacing: 0.025em;
  border-bottom: 1px solid var(--gray-20);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}

.data-table th:hover { background: var(--gray-20); }

.data-table th .sort-arrow {
  font-size: 0.625rem;
  margin-left: 0.25rem;
  color: var(--gray-40);
}

.data-table td {
  padding: 0.5rem 0.75rem;
  border-bottom: 1px solid var(--gray-10);
  color: var(--gray-70);
}

.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--gray-10); }

.data-table td.editable { cursor: pointer; min-height: 2rem; }
.data-table td.editable:empty::after { content: '\00a0'; } /* non-breaking space keeps empty cells clickable */
.data-table td.editable:hover { background: #FEF0F0; }

.data-table td input {
  width: 100%;
  padding: 0.25rem 0.375rem;
  border: 1px solid var(--primary);
  border-radius: 4px;
  font-size: 0.875rem;
  font-family: inherit;
  color: var(--gray-90);
  background: white;
  outline: none;
  box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.15);
}

.data-table tr.selected td {
  background: #FEF0F0;
}

.data-table .row-actions {
  width: 40px;
  text-align: center;
}

/* ===== Loading ===== */
.loading-overlay {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4rem;
  color: var(--gray-50);
}

.loading-spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--gray-20);
  border-top-color: var(--rh-red);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 0.75rem;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Message Banner ===== */
.message-banner {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  padding: 0.75rem 1.25rem;
  border-radius: var(--radius);
  font-size: 0.875rem;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  z-index: 300;
  animation: slideUp 0.3s ease;
}

.message-banner.success { background: var(--success); color: white; }
.message-banner.error { background: var(--danger); color: white; }

@keyframes slideUp {
  from { transform: translateX(-50%) translateY(1rem); opacity: 0; }
  to { transform: translateX(-50%) translateY(0); opacity: 1; }
}

/* ===== Empty State ===== */
.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--gray-50);
}

.empty-state h3 {
  font-size: 1.125rem;
  color: var(--gray-70);
  margin-bottom: 0.5rem;
}

/* ===== Confirm Dialog ===== */
.confirm-overlay {
  position: fixed;
  inset: 0;
  z-index: 250;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0, 0, 0, 0.4);
}

.confirm-dialog {
  background: white;
  border: 1px solid var(--gray-20);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 1.5rem;
  max-width: 400px;
  width: 90%;
}

.confirm-dialog h3 { margin-bottom: 0.5rem; color: var(--gray-95); }
.confirm-dialog p { color: var(--gray-60); font-size: 0.875rem; margin-bottom: 1rem; }

.confirm-actions {
  display: flex;
  gap: 0.5rem;
  justify-content: flex-end;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .header-content { flex-wrap: wrap; height: auto; padding: 0.75rem 0; gap: 0.5rem; }
  .filter-row { flex-direction: column; }
  .filter-group select, .filter-group input[type="text"] { min-width: 100%; }
  .filter-actions { margin-left: 0; width: 100%; justify-content: space-between; }
  .card-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .modal-content { margin-top: 0.5rem; }
  .td-tabs { gap: 0; }
}
</style>
