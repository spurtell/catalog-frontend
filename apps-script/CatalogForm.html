<!-- Catalog Add/Edit Modal Form -->
<div class="modal-content">
  <div class="modal-header">
    <h2 id="catalogFormTitle">Add Resource</h2>
    <button class="modal-close" id="catalogModalClose">&times;</button>
  </div>
  <div class="modal-body">
    <form id="catalogForm">
      <input type="hidden" id="formRowIndex">

      <div class="form-group">
        <label for="formTitle">Title <span class="required">*</span></label>
        <input type="text" id="formTitle" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="formResourceType">Resource Type <span class="required">*</span></label>
          <select id="formResourceType" required>
            <option value="">Select...</option>
            <option value="Reference">Reference</option>
            <option value="Process">Process</option>
            <option value="How-To">How-To</option>
            <option value="Playbook">Playbook</option>
            <option value="Policy">Policy</option>
            <option value="Template">Template</option>
          </select>
        </div>
        <div class="form-group">
          <label for="formStatus">Status <span class="required">*</span></label>
          <select id="formStatus" required>
            <option value="">Select...</option>
            <option value="Current">Current</option>
            <option value="Needs Review">Needs Review</option>
            <option value="Gap">Gap</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="formFunctionArea">Function Area</label>
          <input type="text" id="formFunctionArea" placeholder="e.g., Build & CI/CD; Testing & Quality">
        </div>
        <div class="form-group">
          <label>Component</label>
          <div class="multiselect" id="componentMultiselect">
            <button type="button" class="multiselect-toggle" id="componentToggle">
              <span class="placeholder">Select components...</span>
              <span class="arrow">&#9662;</span>
            </button>
            <div class="multiselect-dropdown" id="componentDropdown" style="display:none;">
              <!-- Checkboxes populated by JS -->
            </div>
          </div>
          <input type="hidden" id="formComponent">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="formSystemOfRecord">System of Record</label>
          <select id="formSystemOfRecord">
            <option value="">Select...</option>
            <option value="Google Drive">Google Drive</option>
            <option value="GitHub">GitHub</option>
            <option value="Jira">Jira</option>
            <option value="NotebookLM">NotebookLM</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="formOwner">Owner / DRI</label>
          <input type="text" id="formOwner" placeholder="e.g., ACM Team">
        </div>
      </div>

      <div class="form-group">
        <label for="formLink">Link</label>
        <input type="url" id="formLink" placeholder="https://...">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="formLastReviewed">Last Reviewed</label>
          <input type="date" id="formLastReviewed">
        </div>
        <div class="form-group">
          <label for="formReviewCadence">Review Cadence</label>
          <input type="text" id="formReviewCadence" placeholder="e.g., Quarterly">
        </div>
      </div>

      <div class="form-group">
        <label for="formSummary">Short Summary</label>
        <textarea id="formSummary" rows="3" placeholder="Brief description of this resource..."></textarea>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <div>
      <button class="btn btn-danger" id="catalogDeleteBtn" style="display:none;">Delete</button>
    </div>
    <div class="modal-footer-right">
      <button class="btn btn-secondary" id="catalogCancelBtn">Cancel</button>
      <button class="btn btn-primary" id="catalogSaveBtn">Save</button>
    </div>
  </div>
</div>
